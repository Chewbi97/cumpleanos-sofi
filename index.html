<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feliz Cumpleaños Sofi 🎂</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      #poem-screen,
      #album-screen {
        cursor: none !important; /* Oculta el puntero en estas pantallas */
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #fff0f5;
        color: #5a1028;
        font-family: "Playfair Display", Georgia, serif;
        height: 100vh;
        overflow: hidden;
      }

      #bg-texture {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.12;
        background-image: url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ff4d7d' fill-opacity='1'%3E%3Cpath d='M40 35c-1-4-4-7-8-7s-8 4-8 8c0 7 8 14 16 20 8-6 16-13 16-20 0-4-4-8-8-8s-7 3-8 7z'/%3E%3C/g%3E%3C/svg%3E");
      }

      #welcome-screen {
        position: relative;
        z-index: 1;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }

      #welcome-screen h1 {
        color: #be185d;
        text-shadow: 0 0 40px rgba(190, 24, 93, 0.2);
        font-size: 3.8rem;
        font-weight: 700;
        opacity: 0;
        animation: fadeIn 2s ease forwards;
      }

      #welcome-screen p {
        font-size: 1.2rem;
        margin-top: 1rem;
        color: #9d174d;
        opacity: 0;
        animation: fadeIn 2s ease 1.5s forwards;
      }

      #start-btn {
        margin-top: 2.5rem;
        padding: 1rem 2.8rem;
        font-size: 1rem;
        font-family: "Playfair Display", serif;
        border: 2px solid #be185d;
        background: transparent;
        color: #be185d;
        cursor: pointer;
        letter-spacing: 0.15em;
        opacity: 0;
        animation: fadeIn 2s ease 3s forwards;
        transition:
          background 0.3s,
          color 0.3s;
        border-radius: 4px;
      }
      #start-btn:hover {
        background: #be185d;
        color: #fff0f5;
      }

      #album-screen {
        display: none;
        position: fixed;
        z-index: 2;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #album-screen.active {
        display: block;
      }

      #album-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      #slide-info {
        position: absolute;
        bottom: 60px;
        width: 100%;
        text-align: center;
        z-index: 5;
        pointer-events: none;
      }
      #slide-year {
        font-size: 0.85rem;
        letter-spacing: 0.4em;
        color: #ffffff;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      #slide-phrase {
        font-size: 1.1rem;
        color: #ffffff;
        font-style: italic;
      }
      #progress-bar {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        width: 420px;
        height: 3px;
        background: rgba(255, 133, 161, 0.15);
        border-radius: 2px;
        z-index: 5;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: #ff4d7d;
        border-radius: 2px;
        transition: width linear;
      }
      #slide-counter {
        position: absolute;
        top: 1.5rem;
        right: 1.5rem;
        font-size: 0.8rem;
        color: rgba(255, 179, 198, 0.4);
        z-index: 5;
        letter-spacing: 0.1em;
      }
      #nav-dots {
        position: fixed;
        bottom: 18px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        z-index: 100;
      }
      .nav-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 133, 161, 0.3);
        border: 1px solid #ff85a1;
        cursor: pointer;
        transition:
          background 0.3s,
          transform 0.3s;
      }
      .nav-dot.active {
        background: #ff85a1;
        transform: scale(1.3);
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="nav-dots">
      <div class="nav-dot active" data-section="welcome" title="Inicio"></div>
      <div class="nav-dot" data-section="album" title="Álbum"></div>
      <div class="nav-dot" data-section="poem" title="Para ti"></div>
    </div>
    <div id="bg-texture"></div>
    <canvas
      id="heartCanvas"
      style="position: fixed; top: 0; left: 0; z-index: 0"
    ></canvas>

    <div id="welcome-screen">
      <h1>Feliz Cumpleaños Sofi 🎂</h1>
      <p>Un regalo hecho con amor</p>
      <button id="start-btn">Abre tu regalo ✨</button>
    </div>

    <div id="album-screen">
      <canvas id="album-canvas"></canvas>
      <div id="slide-counter"></div>
      <div id="slide-info">
        <div id="slide-year"></div>
        <div id="slide-phrase"></div>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
    </div>

    <script>
      // ── SLIDES ──
      // Reemplaza los nombres de archivo con los nombres reales de tus fotos.
      // Cada carpeta assets/fotos/0/ a assets/fotos/14/ corresponde a un año.
      const slides = [
        {
          year: "2012",
          phrase: "El inicio de tu historia ✨",
          photos: [
            "assets/fotos/0/foto1.jpeg",
            "assets/fotos/0/foto2.jpeg",
            "assets/fotos/0/foto3.jpeg",
          ],
        },
        {
          year: "2013",
          phrase: "Cada día más tú 🌸",
          photos: ["assets/fotos/1/foto1.jpeg", "assets/fotos/1/foto2.jpeg"],
        },
        {
          year: "2014",
          phrase: "Creciendo con gracia 🌷",
          photos: ["assets/fotos/2/foto1.jpeg", "assets/fotos/2/foto2.jpeg"],
        },
        {
          year: "2015",
          phrase: "Llena de luz y alegría ☀️",
          photos: [
            "assets/fotos/3/foto1.jpeg",
            "assets/fotos/3/foto2.jpeg",
            "assets/fotos/3/foto3.jpeg",
          ],
        },
        {
          year: "2016",
          phrase: "Tu sonrisa lo ilumina todo 😊",
          photos: [
            "assets/fotos/4/foto1.jpeg",
            "assets/fotos/4/foto2.jpeg",
            "assets/fotos/4/foto3.jpeg",
          ],
        },
        {
          year: "2017",
          phrase: "Aventuras sin fin 🌟",
          photos: ["assets/fotos/5/foto1.png", "assets/fotos/5/foto2.jpeg"],
        },
        {
          year: "2018",
          phrase: "Tan valiente, tan especial 💫",
          photos: [
            "assets/fotos/6/foto1.jpeg",
            "assets/fotos/6/foto2.jpeg",
            "assets/fotos/6/foto3.jpeg",
          ],
        },
        {
          year: "2019",
          phrase: "El mundo es tuyo 🌍",
          photos: ["assets/fotos/7/foto1.jpeg", "assets/fotos/7/foto2.jpeg"],
        },
        {
          year: "2020",
          phrase: "Brillando a tu manera ⭐",
          photos: [
            "assets/fotos/8/foto1.jpeg",
            "assets/fotos/8/foto2.jpeg",
            "assets/fotos/8/foto3.jpeg",
          ],
        },
        {
          year: "2021",
          phrase: "Fuerte ante todo 💪",
          photos: [
            "assets/fotos/9/foto1.jpeg",
            "assets/fotos/9/foto2.jpeg",
            "assets/fotos/9/foto3.jpeg",
          ],
        },
        {
          year: "2022",
          phrase: "Más hermosa cada día 🌺",
          photos: ["assets/fotos/10/foto1.jpeg", "assets/fotos/10/foto2.jpeg"],
        },
        {
          year: "2023",
          phrase: "Tu historia sigue escribiéndose 📖",
          photos: ["assets/fotos/11/foto1.jpeg", "assets/fotos/11/foto2.jpeg"],
        },
        {
          year: "2024",
          phrase: "Imparable 🚀",
          photos: [
            "assets/fotos/12/foto1.jpeg",
            "assets/fotos/12/foto2.jpeg",
            "assets/fotos/12/foto3.jpeg",
          ],
        },
        {
          year: "2025",
          phrase: "Maravillando mi mundo 🎆",
          photos: ["assets/fotos/13/foto1.jpeg", "assets/fotos/13/foto2.jpeg"],
        },
        {
          year: "2026",
          phrase: "14 años de pura magia 🎂",
          photos: ["assets/fotos/14/foto1.jpeg"],
        },
      ];

      // Música dura hasta 3:25 (205s) → 205000ms / 15 slides = ~13600ms por slide
      const SLIDE_DURATION = 13600;

      const albumAudio = new Audio(
        "assets/audio/Alejandra Guzmán - Yo Te Esperaba.mp3",
      );
      albumAudio.volume = 0.8;

      // Fade out de la música: de 3:20 (200s) a 3:25 (205s) baja gradualmente a 0
      albumAudio.addEventListener("timeupdate", () => {
        const t = albumAudio.currentTime;
        if (t >= 200 && t < 205) {
          albumAudio.volume = Math.max(0, 0.8 * (1 - (t - 200) / 5));
        } else if (t >= 205) {
          albumAudio.volume = 0;
          albumAudio.pause();
        }
      });

      // ── CORAZÓN ──
      const hCanvas = document.getElementById("heartCanvas");
      const hCtx = hCanvas.getContext("2d");
      hCanvas.width = window.innerWidth;
      hCanvas.height = window.innerHeight;

      function heartX(t) {
        return 16 * Math.pow(Math.sin(t), 3);
      }
      function heartY(t) {
        return -(
          13 * Math.cos(t) -
          5 * Math.cos(2 * t) -
          2 * Math.cos(3 * t) -
          Math.cos(4 * t)
        );
      }

      const particles = [];
      function createParticles() {
        particles.length = 0;
        const scale = Math.min(hCanvas.width, hCanvas.height) * 0.028;
        for (let i = 0; i < 180; i++) {
          const t = (i / 180) * 2 * Math.PI;
          particles.push({
            tx: hCanvas.width / 2 + heartX(t) * scale,
            ty: hCanvas.height / 2 + heartY(t) * scale,
            x: Math.random() * hCanvas.width,
            y: Math.random() * hCanvas.height,
            size: Math.random() * 2.5 + 1,
            color: `hsl(${Math.random() * 40 + 320},90%,${Math.random() * 20 + 65}%)`,
            speed: Math.random() * 0.008 + 0.003,
          });
        }
      }
      createParticles();
      window.addEventListener("resize", () => {
        hCanvas.width = window.innerWidth;
        hCanvas.height = window.innerHeight;
        createParticles();
      });

      let gathered = false,
        hTimer = 0;
      function animateHeart() {
        requestAnimationFrame(animateHeart);
        hCtx.clearRect(0, 0, hCanvas.width, hCanvas.height);
        hTimer += 0.005;
        particles.forEach((p) => {
          if (!gathered) {
            p.x += (p.tx - p.x) * p.speed;
            p.y += (p.ty - p.y) * p.speed;
          } else {
            p.x = p.tx + Math.sin(hTimer + p.speed * 100) * 4;
            p.y = p.ty + Math.cos(hTimer + p.speed * 100) * 4;
          }
          hCtx.beginPath();
          hCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          hCtx.fillStyle = p.color;
          hCtx.fill();
        });
        if (hTimer > 8.5) gathered = true;
      }
      animateHeart();

      // ── ÁLBUM ──
      const ac = document.getElementById("album-canvas");
      const actx = ac.getContext("2d");
      let W, H;
      function resize() {
        W = ac.width = window.innerWidth;
        H = ac.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      function leaf(x, y, angle, size, sway) {
        actx.save();
        actx.translate(x, y);
        actx.rotate(angle + sway);
        actx.beginPath();
        actx.moveTo(0, 0);
        actx.bezierCurveTo(
          size * 0.5,
          -size * 0.4,
          size * 1.1,
          -size * 0.2,
          size * 1.2,
          0,
        );
        actx.bezierCurveTo(
          size * 1.1,
          size * 0.2,
          size * 0.5,
          size * 0.4,
          0,
          0,
        );
        actx.strokeStyle = "rgba(120,20,60,0.4)";
        actx.lineWidth = 0.5;
        actx.stroke();
        actx.beginPath();
        actx.moveTo(0, 0);
        actx.lineTo(size * 1.2, 0);
        actx.strokeStyle = "rgba(150,30,70,0.5)";
        actx.lineWidth = 0.6;
        actx.stroke();
        actx.restore();
      }

      function flower(x, y, size, pulse) {
        const s = size * pulse;
        const petalColors = [
          "#ff85a1",
          "#ff4d7d",
          "#ffb3c6",
          "#ff6b9d",
          "#ff85a1",
        ];
        for (let i = 0; i < 5; i++) {
          actx.save();
          actx.translate(x, y);
          actx.rotate((i / 5) * Math.PI * 2);
          actx.beginPath();
          actx.ellipse(0, -s * 1.1, s * 0.5, s * 0.9, 0, 0, Math.PI * 2);
          actx.fillStyle = petalColors[i];
          actx.globalAlpha = 0.85;
          actx.fill();
          actx.restore();
        }
        actx.beginPath();
        actx.arc(x, y, s * 0.5, 0, Math.PI * 2);
        actx.fillStyle = "#ffe0eb";
        actx.globalAlpha = 1;
        actx.fill();
      }

      function vine(points) {
        actx.beginPath();
        actx.moveTo((points[0][0] * W) / 680, (points[0][1] * H) / 500);
        for (let i = 1; i < points.length - 1; i++) {
          const mx = (((points[i][0] + points[i + 1][0]) / 2) * W) / 680;
          const my = (((points[i][1] + points[i + 1][1]) / 2) * H) / 500;
          actx.quadraticCurveTo(
            (points[i][0] * W) / 680,
            (points[i][1] * H) / 500,
            mx,
            my,
          );
        }
        actx.strokeStyle = "#5a1028";
        actx.lineWidth = 2.5;
        actx.globalAlpha = 0.9;
        actx.stroke();
        actx.globalAlpha = 1;
      }

      function balloon(x, y, rx, ry, color, highlight, t, phase) {
        const bx = (x * W) / 680 + Math.sin(t * 0.5 + phase) * 2;
        const by = (y * H) / 500 + Math.sin(t * 0.8 + phase) * 5;
        const grad = actx.createRadialGradient(
          bx - rx * 0.3,
          by - ry * 0.3,
          rx * 0.05,
          bx,
          by,
          rx * 1.1,
        );
        grad.addColorStop(0, highlight);
        grad.addColorStop(0.4, color);
        grad.addColorStop(1, "rgba(0,0,0,0.5)");
        actx.beginPath();
        actx.ellipse(bx, by, rx, ry, 0, 0, Math.PI * 2);
        actx.fillStyle = grad;
        actx.fill();
        actx.beginPath();
        actx.ellipse(
          bx - rx * 0.25,
          by - ry * 0.25,
          rx * 0.2,
          ry * 0.15,
          -0.5,
          0,
          Math.PI * 2,
        );
        actx.fillStyle = "rgba(255,255,255,0.35)";
        actx.fill();
        actx.beginPath();
        actx.moveTo(bx, by + ry);
        actx.bezierCurveTo(
          bx + 8,
          by + ry + 15,
          bx - 5,
          by + ry + 25,
          bx,
          by + ry + 40,
        );
        actx.strokeStyle = color;
        actx.lineWidth = 1.2;
        actx.globalAlpha = 0.7;
        actx.stroke();
        actx.globalAlpha = 1;
      }

      // Estado de imágenes con soporte crossfade
      let currentImg = new Image();
      let nextImg = new Image();
      let imgAlpha = 1;
      let crossAlpha = 0;
      let isCrossfading = false;
      let albumT = 0,
        currentSlide = 0,
        albumRunning = false;
      let slidePhotoTimers = [];

      function loadImage(src, cb) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => cb(img);
        img.onerror = () => cb(null);
        img.src = src;
      }

      function preloadSlidePhotos(index, cb) {
        const photos = slides[index].photos;
        const imgs = new Array(photos.length);
        let loaded = 0;
        photos.forEach((src, i) => {
          loadImage(src, (img) => {
            imgs[i] = img;
            if (++loaded === photos.length) cb(imgs);
          });
        });
      }

      function crossfadeTo(img) {
        if (!img) return;
        isCrossfading = true;
        nextImg = img;
        crossAlpha = 0;
        const SPEED = 0.025;
        function tick() {
          if (!isCrossfading) return;
          crossAlpha += SPEED;
          if (crossAlpha >= 1) {
            currentImg = nextImg;
            imgAlpha = 1;
            crossAlpha = 0;
            isCrossfading = false;
            return;
          }
          imgAlpha = 1 - crossAlpha;
          requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);
      }

      function drawAlbum() {
        if (!albumRunning) return;
        requestAnimationFrame(drawAlbum);
        albumT += 0.015;
        actx.clearRect(0, 0, W, H);
        actx.fillStyle = "#1a0a10";
        actx.fillRect(0, 0, W, H);

        vine([
          [30, 500],
          [28, 420],
          [35, 340],
          [25, 260],
          [40, 180],
          [30, 100],
          [50, 40],
        ]);
        vine([
          [650, 500],
          [648, 410],
          [640, 330],
          [655, 250],
          [642, 170],
          [650, 90],
          [630, 40],
        ]);
        vine([
          [30, 250],
          [60, 230],
          [90, 240],
          [110, 220],
        ]);
        vine([
          [650, 250],
          [620, 230],
          [590, 240],
          [570, 220],
        ]);

        [
          [45, 480, 0.3, 18],
          [28, 430, -0.5, 16],
          [50, 390, 0.6, 20],
          [25, 350, -0.3, 15],
          [48, 310, 0.4, 18],
          [30, 270, -0.6, 16],
          [52, 230, 0.3, 20],
          [28, 190, -0.4, 15],
          [45, 150, 0.5, 18],
          [35, 110, -0.3, 16],
          [50, 70, 0.4, 19],
        ].forEach(([x, y, a, s]) => {
          leaf(
            (x * W) / 680,
            (y * H) / 500,
            a,
            s,
            Math.sin(albumT * 0.6 + x * 0.05) * 0.1,
          );
        });

        [
          [635, 480, -0.3, 18],
          [652, 430, 0.5, 16],
          [630, 390, -0.6, 20],
          [655, 350, 0.3, 15],
          [632, 310, -0.4, 18],
          [650, 270, 0.6, 16],
          [628, 230, -0.3, 20],
          [652, 190, 0.4, 15],
          [635, 150, -0.5, 18],
          [645, 110, 0.3, 16],
          [630, 70, -0.4, 19],
        ].forEach(([x, y, a, s]) => {
          leaf(
            (x * W) / 680,
            (y * H) / 500,
            Math.PI + a,
            s,
            Math.sin(albumT * 0.6 + x * 0.05) * 0.1,
          );
        });

        [
          [38, 460, 7],
          [55, 380, 6],
          [32, 300, 8],
          [50, 220, 6],
          [38, 140, 7],
          [55, 80, 6],
          [642, 460, 7],
          [625, 380, 6],
          [648, 300, 8],
          [630, 220, 6],
          [642, 140, 7],
          [625, 80, 6],
        ].forEach(([x, y, s]) => {
          flower(
            (x * W) / 680,
            (y * H) / 500,
            s,
            1 + Math.sin(albumT * 1.2 + x * 0.1) * 0.05,
          );
        });

        balloon(90, 200, 22, 28, "#be185d", "#fb7185", albumT, 0);
        balloon(65, 320, 18, 23, "#9d174d", "#f472b6", albumT, 1.5);
        balloon(82, 120, 20, 25, "#831843", "#fda4af", albumT, 0.8);
        balloon(590, 180, 22, 28, "#be185d", "#fb7185", albumT, 2.1);
        balloon(615, 310, 18, 23, "#9d174d", "#f9a8d4", albumT, 0.4);
        balloon(598, 90, 20, 25, "#881337", "#fecdd3", albumT, 1.2);

        const fx = (130 * W) / 680,
          fy = (45 * H) / 500;
        const fw = (420 * W) / 680,
          fh = (330 * H) / 500;
        actx.strokeStyle = "#ff4d7d";
        actx.lineWidth = 2.5;
        actx.globalAlpha = 0.7;
        actx.strokeRect(fx, fy, fw, fh);
        actx.strokeStyle = "#ffb3c6";
        actx.lineWidth = 1;
        actx.globalAlpha = 0.2;
        actx.strokeRect(fx + 5, fy + 5, fw - 10, fh - 10);
        actx.globalAlpha = 1;

        if (currentImg && currentImg.complete && currentImg.naturalWidth > 0) {
          actx.globalAlpha = imgAlpha;
          actx.drawImage(currentImg, fx + 3, fy + 3, fw - 6, fh - 6);
        }
        if (
          isCrossfading &&
          nextImg &&
          nextImg.complete &&
          nextImg.naturalWidth > 0
        ) {
          actx.globalAlpha = crossAlpha;
          actx.drawImage(nextImg, fx + 3, fy + 3, fw - 6, fh - 6);
        }
        actx.globalAlpha = 1;
      }

      function showSlide(index) {
        // Cancelar timers de fotos del slide anterior
        slidePhotoTimers.forEach((t) => clearTimeout(t));
        slidePhotoTimers = [];

        const slide = slides[index];
        document.getElementById("slide-year").textContent = slide.year;
        document.getElementById("slide-phrase").textContent = slide.phrase;
        document.getElementById("slide-counter").textContent =
          `${index + 1} / ${slides.length}`;

        const fill = document.getElementById("progress-fill");
        fill.style.transition = "none";
        fill.style.width = "0%";
        setTimeout(() => {
          fill.style.transition = `width ${SLIDE_DURATION}ms linear`;
          fill.style.width = "100%";
        }, 50);

        preloadSlidePhotos(index, (imgs) => {
          const valid = imgs.filter(Boolean);
          if (!valid.length) return;

          // Primera foto: fade-in suave desde 0
          currentImg = valid[0];
          imgAlpha = 0;
          isCrossfading = false;
          let fadeT = 0;
          (function fadeIn() {
            fadeT += 0.035;
            imgAlpha = Math.min(fadeT, 1);
            if (fadeT < 1) requestAnimationFrame(fadeIn);
          })();

          // Fotos restantes: crossfade distribuido en el tiempo del slide
          if (valid.length > 1) {
            const interval = (SLIDE_DURATION - 1500) / valid.length;
            for (let i = 1; i < valid.length; i++) {
              const t = setTimeout(
                () => crossfadeTo(valid[i]),
                1500 + interval * i,
              );
              slidePhotoTimers.push(t);
            }
          }
        });
      }

      function nextSlide() {
        currentSlide++;
        if (currentSlide < slides.length) {
          showSlide(currentSlide);
          setTimeout(nextSlide, SLIDE_DURATION);
        } else {

        }

      document.getElementById("start-btn").addEventListener("click", () => {

      const poemLines = [

      function startPoemScene() {
        const poemScreen = document.createElement("div");
        poemScreen.id = "poem-screen";
        poemScreen.style.cssText =
          "position:fixed;top:0;left:0;width:100%;height:100%;background:#1a0a10;z-index:10;overflow:hidden;";

        const poemCanvas = document.createElement("canvas");
        poemCanvas.id = "poem-canvas";
        poemCanvas.style.cssText =
          "position:absolute;top:0;left:0;width:100%;height:100%;";

        const lyricsBox = document.createElement("div");
        lyricsBox.id = "lyrics-box";
        lyricsBox.style.cssText = `
          position:absolute;top:50%;left:50%;
          transform:translate(-50%,-50%);
          width:90%;max-width:650px;
          text-align:center;z-index:15;
          padding:0 1rem;
        `;

        poemScreen.appendChild(poemCanvas);
        poemScreen.appendChild(lyricsBox);
        document.body.appendChild(poemScreen);

        const pc = poemCanvas;
        const pctx = pc.getContext("2d");
        pc.width = window.innerWidth;
        pc.height = window.innerHeight;

        thousandYears.play();
        thousandYears.volume = 0.8;

        const textParticles = [];
        let phase = "text";
        let poemT = 0;
        let textFormed = false;

        // ── FUNCIÓN CORREGIDA: tamaño proporcional, muestreo balanceado ──
        function getTextParticles(text) {
          // Canvas proporcional a la pantalla real, con margen lateral
          const margin = 0.8;
          const offW = Math.floor(pc.width * margin);
          // Altura generosa para acomodar 2 líneas sin recorte
          const offH = Math.floor(offW * 0.5);

          const off = document.createElement("canvas");
          off.width = offW;
          off.height = offH;
          const octx = off.getContext("2d");

          // Fuente proporcional: ocupa ~35% del ancho por línea
          const fontSize = Math.floor(offW * 0.1);
          octx.font = `700 ${fontSize}px "Playfair Display", Georgia, serif`;
          octx.fillStyle = "#fff";
          octx.textAlign = "center";
          octx.textBaseline = "middle";

          // Siempre dividir en 2 líneas para que quepa bien
          const words = text.split(" ");
          const mid = Math.ceil(words.length / 2);
          const line1 = words.slice(0, mid).join(" ");
          const line2 = words.slice(mid).join(" ");
          const lineH = fontSize * 1.35;
          octx.fillText(line1, offW / 2, offH / 2 - lineH / 2);
          octx.fillText(line2, offW / 2, offH / 2 + lineH / 2);

          const data = octx.getImageData(0, 0, offW, offH).data;
          const pts = [];

          // Muestreo cada 3px: buen balance entre densidad y rendimiento
          const step = 3;
          for (let y = 0; y < offH; y += step) {
            for (let x = 0; x < offW; x += step) {
              const idx = (Math.floor(y) * offW + Math.floor(x)) * 4;
              if (data[idx + 3] > 128) {
                // Centrar el bloque de texto en la pantalla
                pts.push({
                  tx: pc.width / 2 - offW / 2 + x,
                  ty: pc.height / 2 - offH / 2 + y,
                });
              }
            }
          }
          return pts;
        }

        function buildTextParticles() {
          textParticles.length = 0;
          const pts = getTextParticles("Feliz Cumpleaños Cachetes");
          pts.forEach((p) => {
            textParticles.push({
              x: Math.random() * pc.width,
              y: Math.random() * pc.height,
              tx: p.tx,
              ty: p.ty,
              // Partículas más grandes para mejor visibilidad
              size: Math.random() * 2.2 + 1.5,
              color: `hsl(${Math.random() * 60 + 300},100%,${Math.random() * 30 + 60}%)`,
              // Velocidad alta: llegan en ~3-4 segundos
              speed: Math.random() * 0.08 + 0.06,
            });
          });
        }
        buildTextParticles();

        const heartParts = [];
        function buildHeartParticles() {
          heartParts.length = 0;
          const scale = Math.min(pc.width, pc.height) * 0.028;
          for (let i = 0; i < 600; i++) {
            const t = (i / 600) * 2 * Math.PI;
            heartParts.push({
              tx: pc.width / 2 + heartX(t) * scale,
              ty: pc.height / 2 + heartY(t) * scale,
              x: Math.random() * pc.width,
              y: Math.random() * pc.height,
              size: Math.random() * 2.5 + 1,
              color: `hsl(${Math.random() * 40 + 320},90%,${Math.random() * 30 + 55}%)`,
              speed: Math.random() * 0.04 + 0.02,
            });
          }
        }

        let heartGathered = false,
          heartTimer = 0;

        function buildFinalText(parts, canvas) {
          // Definimos un margen de seguridad (85% del ancho del canvas)
          const margin = 0.85;
          const offW = Math.floor(canvas.width * margin);
          const offH = Math.floor(canvas.height * 0.4); // Altura proporcional

          const off = document.createElement("canvas");
          off.width = offW;
          off.height = offH;
          const octx = off.getContext("2d");

          // --- CORRECCIÓN DE RECORTE ---
          const isLandscape = canvas.width > canvas.height;
          // Reducimos la escala de 0.08 a 0.06 en PC
          const fontSize = isLandscape
            ? Math.floor(canvas.width * 0.06) // Ajuste perfecto para PC
            : Math.floor(canvas.width * 0.15); // Tamaño para Móvil (Vertical)

          octx.font = `400 ${fontSize}px "Playfair Display", Georgia, serif`;
          octx.fillStyle = "#fff";
          octx.textAlign = "center";
          octx.textBaseline = "middle";
          octx.letterSpacing = isLandscape ? "8px" : "4px";

          // Dibujamos el texto centrado
          octx.fillText("Te amo hija", offW / 2, offH / 2);

          const data = octx.getImageData(0, 0, offW, offH).data;
          const pts = [];
          const step = isLandscape ? 4 : 2;

          for (let y = 0; y < offH; y += step) {
            for (let x = 0; x < offW; x += step) {
              if (data[(y * offW + x) * 4 + 3] > 128) {
                pts.push({
                  tx: canvas.width / 2 - offW / 2 + x,
                  ty: canvas.height / 2 - offH / 2 + y,
                });
              }
            }
          }

          // Reasignamos las partículas
          parts.forEach((p, i) => {
            const target = pts[i % pts.length];
            p.tx = target.tx;
            p.ty = target.ty;
            p.speed = Math.random() * 0.03 + 0.01;
          });

          heartGathered = false;
          phase = "text_final";
        }
        function animatePoem() {
          requestAnimationFrame(animatePoem);
          poemT += 0.015;
          pctx.clearRect(0, 0, pc.width, pc.height);
          pctx.fillStyle = "#1a0a10";
          pctx.fillRect(0, 0, pc.width, pc.height);

          if (phase === "text") {
            let allArrived = true;
            textParticles.forEach((p) => {
              const dx = p.tx - p.x,
                dy = p.ty - p.y;
              if (Math.sqrt(dx * dx + dy * dy) > 1) {
                p.x += dx * p.speed;
                p.y += dy * p.speed;
                allArrived = false;
              }
              pctx.shadowBlur = 6;
              pctx.shadowColor = p.color;
              pctx.beginPath();
              pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              pctx.fillStyle = p.color;
              pctx.fill();
              pctx.shadowBlur = 0;
            });
            // Pasar al corazón a los 13s (texto ya formado ~3-4s antes)
            if (allArrived && !textFormed) {
              textFormed = true;
              setTimeout(() => {
                phase = "heart";
                buildHeartParticles();
                heartParts.forEach((p) => {
                  const src =
                    textParticles[
                      Math.floor(Math.random() * textParticles.length)
                    ];
                  if (src) {
                    p.x = src.x;
                    p.y = src.y;
                  }
                });
              }, 13000);
            }
          }

          if (phase === "heart") {
            heartTimer += 0.015;
            heartParts.forEach((p) => {
              if (!heartGathered) {
                p.x += (p.tx - p.x) * p.speed;
                p.y += (p.ty - p.y) * p.speed;
              } else {
                p.x = p.tx + Math.sin(heartTimer + p.speed * 100) * 4;
                p.y = p.ty + Math.cos(heartTimer + p.speed * 100) * 4;
              }
              pctx.shadowBlur = 6;
              pctx.shadowColor = p.color;
              pctx.beginPath();
              pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              pctx.fillStyle = p.color;
              pctx.fill();
              pctx.shadowBlur = 0;
            });
            if (heartTimer > 5) heartGathered = true;
          }

          if (phase === "text_final") {
            heartParts.forEach((p) => {
              p.x += (p.tx - p.x) * p.speed;
              p.y += (p.ty - p.y) * p.speed;
              pctx.shadowBlur = 6;
              pctx.shadowColor = p.color;
              pctx.beginPath();
              pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              pctx.fillStyle = p.color;
              pctx.fill();
              pctx.shadowBlur = 0;
            });
          }
        }
        animatePoem();

        // ── LETRA SINCRONIZADA ──
        setTimeout(() => {
          let vol = thousandYears.volume;
          const fadeDown = setInterval(() => {
            vol = Math.max(0.18, vol - 0.01);
            thousandYears.volume = vol;
            if (vol <= 0.18) clearInterval(fadeDown);
          }, 100);
          setTimeout(() => poemAudio.play(), 2000);

          poemAudio.addEventListener("timeupdate", () => {
            const t = poemAudio.currentTime;
            const line = poemLines.find((l) => t >= l.start && t < l.end);
            if (line && lyricsBox.dataset.current !== line.text) {
              lyricsBox.dataset.current = line.text;
              typeWriter(lyricsBox, line.text);
            }
          });

          poemAudio.addEventListener("ended", () => {
            let vol2 = thousandYears.volume;
            const fadeUp = setInterval(() => {
              vol2 = Math.min(0.8, vol2 + 0.02);
              thousandYears.volume = vol2;
              if (vol2 >= 0.8) clearInterval(fadeUp);
            }, 150);

            setTimeout(() => {
              lyricsBox.innerHTML = "";
              lyricsBox.dataset.current = "";
              buildFinalText(heartParts, pc);
              let vol3 = thousandYears.volume;
              const fadeOut = setInterval(() => {
                vol3 = Math.max(0, vol3 - 0.005);
                thousandYears.volume = vol3;
                if (vol3 <= 0) {
                  clearInterval(fadeOut);
                  thousandYears.pause();
                }
              }, 100);
            }, 10000);
          });
        }, 15000);
      }

      function typeWriter(el, text) {
        el.innerHTML = "";
        const p = document.createElement("p");
        p.style.cssText = `
          color:#ffe0eb;
          font-family:'Playfair Display',serif;
          font-size:0.95rem;
          font-style:italic;
          line-height:1.6;
          text-shadow:0 0 20px rgba(255,133,161,0.5);
        `;
        el.appendChild(p);
        let i = 0;
        function type() {
          if (i < text.length) {
            p.textContent += text[i];
            i++;
            setTimeout(type, 35);
          }
        }
        type();
      }

      // ── NAVEGACIÓN ──
      function setActiveDot(section) {
        document.querySelectorAll(".nav-dot").forEach((d) => {
          d.classList.toggle("active", d.dataset.section === section);
        });
      }

      document.querySelectorAll(".nav-dot").forEach((dot) => {
        dot.addEventListener("click", () => {
          const section = dot.dataset.section;
          albumAudio.pause();
          albumAudio.currentTime = 0;
          thousandYears.pause();
          thousandYears.currentTime = 0;
          poemAudio.pause();
          poemAudio.currentTime = 0;
          const tr = document.getElementById("transition-screen");
          const ps = document.getElementById("poem-screen");
          if (tr) tr.remove();
          if (ps) ps.remove();

          if (section === "welcome") {
            document.getElementById("welcome-screen").style.display = "flex";
            document.getElementById("album-screen").classList.remove("active");
            albumRunning = false;
            gathered = false;
            hTimer = 0;
            createParticles();
          } else if (section === "album") {
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("album-screen").classList.add("active");
            albumRunning = true;
            currentSlide = 0;
            slidePhotoTimers.forEach((t) => clearTimeout(t));
            slidePhotoTimers = [];
            drawAlbum();
            showSlide(0);
            albumAudio.play();
            setTimeout(nextSlide, SLIDE_DURATION);
          } else if (section === "poem") {
            document.getElementById("welcome-screen").style.display = "none";
            document.getElementById("album-screen").classList.remove("active");
            albumRunning = false;
            showTransition();
          }
          setActiveDot(section);
        });
      });
